name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: qwhyper-linux-x86_64
            bin: qwhyper
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: qwhyper-macos-x86_64
            bin: qwhyper
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: qwhyper-macos-aarch64
            bin: qwhyper
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: qwhyper-windows-x86_64.exe
            bin: qwhyper.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package Unix
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ matrix.bin }} ${{ matrix.artifact }}
      - name: Package Windows
        if: runner.os == 'Windows'
        run: copy target\\${{ matrix.target }}\\release\\${{ matrix.bin }} ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/qwhyper-*
